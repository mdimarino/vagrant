---
# tasks file for kubernetes

- name: Add IP address of all hosts to all hosts
  lineinfile:
    dest: /etc/hosts
    line: "{{ hostvars[item].ansible_facts.all_ipv4_addresses[1] }} {{ hostvars[item].ansible_fqdn }} {{ hostvars[item].ansible_hostname }}"
    state: present
  with_items: "{{ groups.all }}"

- name: Install packages that allow apt to be used over HTTPS
  apt:
    name: "{{ packages }}"
    state: present
    update_cache: yes
  vars:
    packages:
    - apt-transport-https
    - ca-certificates
    - curl
    - gnupg-agent
    - software-properties-common

- name: Add an apt signing key for Docker
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add apt repository for stable version
  apt_repository:
    repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu xenial stable
    state: present

- name: Install docker and its dependecies
  apt: 
    name: "{{ packages }}"
    state: present
    update_cache: yes
  vars:
    packages:
    - docker-ce 
    - docker-ce-cli 
    - containerd.io
  notify:
    - docker status

- name: Add vagrant user to docker group
  user:
    name: vagrant
    group: docker

- name: Add an apt signing key for Kubernetes
  apt_key:
    url: https://packages.cloud.google.com/apt/doc/apt-key.gpg
    state: present

- name: Adding apt repository for Kubernetes
  apt_repository:
    repo: deb https://apt.kubernetes.io/ kubernetes-xenial main
    state: present
    filename: kubernetes.list

- name: Install Kubernetes binaries
  apt: 
    name: "{{ packages }}"
    state: present
    update_cache: yes
  vars:
    packages:
      - kubelet 
      - kubeadm 
      - kubectl

- name: Ensure we have cgroup-driver set under /etc/systemd/system/kubelet.service.d/10-kubeadm.conf
  lineinfile:
    path: /etc/systemd/system/kubelet.service.d/10-kubeadm.conf
    regexp: 'Environment="cgroup-driver='
    insertafter: '^EnvironmentFile=-/etc/default/kubelet'
    line: 'Environment="cgroup-driver=systemd/cgroup-driver=cgroupfs"'

###

- name: Initialize the Kubernetes cluster using kubeadm
  command: kubeadm init --apiserver-advertise-address=192.168.56.221 --pod-network-cidr=192.168.0.0/16
  when: inventory_hostname in groups['kubernetes_masters']

###

- name: Create a directory if it does not exist
  file: path=/home/vagrant/.kube state=directory mode=0755
  when: inventory_hostname in groups['kubernetes_masters']

- name: Copy /etc/kubernetes/admin.conf file on the remote
  copy: src=/etc/kubernetes/admin.conf dest=/home/vagrant/.kube/config remote_src=yes
  when: inventory_hostname in groups['kubernetes_masters']

- name: Change permissions
  file: dest=/home/vagrant/.kube owner=vagrant group=vagrant recurse=yes
  when: inventory_hostname in groups['kubernetes_masters']

###

- name: Install calico pod network
  become: false
  command: kubectl apply -f https://docs.projectcalico.org/v3.7/manifests/calico.yaml
  when: inventory_hostname in groups['kubernetes_masters']

###

- name: Install dashboard at master
  become: false
  command: kubectl apply -f https://raw.githubusercontent.com/kubernetes/dashboard/master/aio/deploy/recommended/kubernetes-dashboard.yaml
  when: inventory_hostname in groups['kubernetes_masters']

###

- name: Generate join command
  become: false
  command: kubeadm token create --print-join-command
  register: join_command
  when: inventory_hostname in groups['kubernetes_masters']

- debug:
    var: join_command

###

- name: Execute join command at nodes
  shell: "{{ join_command[k1].stdout }}"
  when: inventory_hostname in groups['kubernetes_nodes']
